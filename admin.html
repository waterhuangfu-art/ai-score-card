<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台入口</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #eff8ff;
      --bg-2: #fbfdff;
      --panel: rgba(255, 255, 255, 0.94);
      --line: #d6ebff;
      --text: #162134;
      --muted: #63748e;
      --blue: #1798ff;
      --blue-2: #60d6ff;
      --shadow: 0 22px 52px rgba(61, 123, 207, 0.14);
      --radius: 24px;
    }

    body {
      min-height: 100vh;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96, 214, 255, 0.28), transparent 26%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      padding: 24px 16px 36px;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
    }

    .hero,
    .card {
      background: var(--panel);
      border: 1px solid rgba(214, 235, 255, 0.94);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hero {
      padding: 28px;
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-flex;
      padding: 7px 13px;
      border-radius: 999px;
      background: #edf8ff;
      color: var(--blue);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 38px;
      line-height: 1.08;
      letter-spacing: -0.05em;
      margin-bottom: 12px;
    }

    .hero p {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.75;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      padding: 24px;
    }

    .card small {
      display: inline-block;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 12px;
    }

    .card h2 {
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
    }

    .card p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
      margin-bottom: 18px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 16px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 800;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--blue-2));
      box-shadow: 0 16px 28px rgba(23, 152, 255, 0.2);
    }

    .btn-secondary {
      color: var(--blue);
      background: #fff;
      border: 1.5px solid var(--line);
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 30px; }
      .hero p { font-size: 15px; }
      .card h2 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="eyebrow">后台入口</div>
      <h1>后台看板也统一收口到这里</h1>
      <p>你现场要看哪一套数据，直接从这里进。前面如果再增加新的评分卡，后台入口也继续按同样方式往下加。</p>
      <div class="actions" style="margin-top:18px">
        <a class="btn btn-secondary" href="./index.html">返回评分卡首页</a>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <small>Admin 01</small>
        <h2>AI含量评分卡后台</h2>
        <p>查看 AI 含量评分的总分分布、阶段分布、五维情况，以及大家最想突破的方向。</p>
        <div class="actions">
          <a class="btn btn-primary" href="./admin-ai.html">进入后台</a>
        </div>
      </article>

      <article class="card">
        <small>Admin 02</small>
        <h2>一人公司准备度后台</h2>
        <p>查看 OPC 自评卡的总分、阶段分布、五维均分和大家当前最想突破的问题。</p>
        <div class="actions">
          <a class="btn btn-primary" href="./admin-opc.html">进入后台</a>
        </div>
      </article>
    </section>
  </div>
</body>
</html>
